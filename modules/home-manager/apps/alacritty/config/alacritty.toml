import = ["~/.config/alacritty/themes/wallust.toml"]

[colors.primary]
background = "#000000"

[colors.cursor]
text = "#e0def4"
cursor = "#524f67"

[colors.vi_mode_cursor]
text = "#e0def4"
cursor = "#524f67"

[window]
# dimensions = { columns = 108, lines = 30 }
padding = { x = 4, y = 4 }
decorations = "none"
opacity = 0.8
blur = true
startup_mode = "maximized"
decorations_theme_variant = "dark"

[font]
bold_italic = { family = "JetBrainsMonoNL Nerd Font", style = "BoldItalic" }
normal = { family = "JetBrainsMonoNL Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMonoNL Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMonoNL Nerd Font", style = "Italic" }
